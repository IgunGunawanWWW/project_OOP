<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Daftar - Kopi Shop</title>

        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
    </head>

    <body>
        <!-- BACKGROUND -->
        <div>
            <img
                class="background-image"
                src="{{ url_for('static', filename='images/menu/bg.jpg') }}"
            />
        </div>

        <div
            style="
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                z-index: -1;
            "
        ></div>

        <!-- NAVBAR -->
        <div class="top-bar">
            <img
                src="{{ url_for('static', filename='images/menu/logo.png') }}"
                alt="Logo"
            />
        </div>

        <!-- CONTENT -->
        <div class="main-content">
            <div class="container">
                <div class="form-box">
                    <h1>Daftar</h1>
                    <p>Buat akun Kopi Shop</p>

                    <!-- ALERT -->
                    {% with messages =
                    get_flashed_messages(with_categories=true) %} {% if messages
                    %} {% for category, message in messages %}
                    <div class="alert {{ category }}">{{ message }}</div>
                    {% endfor %} {% endif %} {% endwith %}

                    <!-- FORM FIX (INI KUNCI UTAMA) -->
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <input
                            type="text"
                            name="nama"
                            placeholder="Nama Lengkap"
                            required
                        />

                        <input
                            type="email"
                            name="email"
                            placeholder="Email"
                            required
                        />

                        <input
                            type="password"
                            name="password"
                            placeholder="Password"
                            required
                        />

                        <button type="submit">Daftar</button>
                    </form>

                    <p style="margin-top: 20px; font-size: 14px">
                        Sudah punya akun?
                        <a
                            href="{{ url_for('auth.login') }}"
                            style="color: #fff; font-weight: 500"
                        >
                            Login
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">© 2026 Kopi Shop</div>
    </body>
</html>
