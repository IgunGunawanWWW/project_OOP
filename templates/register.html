<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link 
        rel="stylesheet" 
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Daftar Akun</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form action="/register" method="POST">
                <input
                    type="text"
                    name="nama"
                    placeholder="Nama Lengkap"
                    required
                >
                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
                <button type="submit">
                    Daftar
                </button>
            </form>
            <p>
                Sudah punya akun?
                <a href="/login">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
