<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kopi Shop</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    

<!-- BACKGROUND LAYER (PALING AMAN) -->
<div>
    <img 
        class="background-image"
        src="{{ url_for('static', filename='images/menu/bg.jpg') }}" 
        alt="background"
    >
</div>
     <div style="
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
"></div>    
<div style="
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: -1;
"></div>

<!-- NAVBAR -->
<div class="top-bar">
    <img src="{{ url_for('static', filename='images/menu/logo.png') }}" alt="logo">
</div>

<!-- CONTENT -->
<div class="main-content">

    <div class="container">

        <div class="form-box">

            {% if session.user_name %}

                <h1>Halo {{ session.user_name }}</h1>

                <p>Anda berhasil login</p>

                <a href="/logout">
                    <button>Logout</button>
                </a>

            {% else %}

                <h1>Selamat Datang</h1>

                <p>Silahkan login atau daftar akun</p>

                <div class="button-group">

                    <a href="/login">
                        <button>Login</button>
                    </a>

                    <a href="/register">
                        <button>Daftar</button>
                    </a>

                </div>

            {% endif %}

        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 Kopi Shop
</div>

</body>
</html>
