<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kopi Shop</title>

    <link 
        rel="stylesheet" 
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>
<body>

    <div class="container">
        <div class="form-box">
            {% if session.user_name %}
                <h1>Halo {{ session.user_name }}</h1>
                <p>Anda berhasil login</p>
                <a href="/logout">
                    <button>Logout</button>
                </a>
            {% else %}
                <h1>Selamat Datang</h1>
                <p>Silahkan login atau daftar akun</p>
                <div class="button-group">
                    <a href="/login">
                        <button>Login</button>
                    </a>
                    <a href="/register">
                        <button>Daftar</button>
                    </a>
                </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
